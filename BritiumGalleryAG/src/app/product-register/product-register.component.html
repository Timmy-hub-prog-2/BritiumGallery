<div class="product-register-container">
  <div class="header-section">
    <h1 class="main-title">Add New Product</h1>
    <p class="subtitle">Fill in the product details and variants below</p>
    <button type="button" class="btn-manage-options" (click)="openOptionsModal()">
      <i class="bi bi-gear"></i> Manage Attribute Options
    </button>
  </div>

  <form (ngSubmit)="onSubmit()" class="product-form" #productForm="ngForm">
    <!-- Product Info Section -->
    <div class="form-section product-info">
      <div class="section-header">
        <i class="bi bi-box-seam"></i>
        <h2>Product Information</h2>
      </div>
      
      <div class="form-grid">
        <div class="form-group full-width">
          <label class="form-label">Product Name</label>
          <div class="input-wrapper">
            <i class="bi bi-tag"></i>
            <input [(ngModel)]="product.name" 
                   name="name" 
                   placeholder="Enter product name" 
                   class="form-input" 
                   required>
          </div>
        </div>

        <div class="form-group full-width">
          <label class="form-label">Description</label>
          <div class="input-wrapper">
            <i class="bi bi-text-paragraph"></i>
            <textarea [(ngModel)]="product.description" 
                     name="description" 
                     placeholder="Enter detailed product description" 
                     class="form-input textarea" 
                     rows="4"></textarea>
          </div>
        </div>

        <!-- Base photo file input -->
        <div class="form-group">
          <label for="basePhoto">Product Base Photo</label>
          <div class="photo-upload-container">
            <input
              type="file"
              id="basePhoto"
              (change)="onBasePhotoSelected($event)"
              class="form-input"
              accept="image/*"
              required
            />
            <div class="photo-preview" *ngIf="basePhotoPreview">
              <img [src]="basePhotoPreview" alt="Base photo preview">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Variants Section -->
    <div class="form-section variants-section">
      <div class="section-header variants-header">
        <div>
          <h2>Product Variants</h2>
          <p class="section-subtitle">Add different versions of your product</p>
        </div>
        <button type="button" class="btn-add-variant" (click)="addVariant()">
          <i class="bi bi-plus-circle"></i>
          Add Variant
        </button>
      </div>

      <div class="variants-grid">
        <div *ngFor="let variant of variants; let i = index" class="variant-card">
          <div class="variant-header">
            <h3>Variant {{ i + 1 }}</h3>
            <button type="button" class="btn-remove" (click)="removeVariant(i)">
              <i class="bi bi-trash"></i>
            </button>
          </div>

          <div class="variant-content">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Price</label>
                <div class="input-wrapper">
                  <i class="bi bi-currency-dollar"></i>
                  <input type="number" 
                         [(ngModel)]="variant.price" 
                         name="price{{i}}" 
                         class="form-input" 
                         placeholder="0.00" 
                         step="0.01"
                         required>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Stock</label>
                <div class="input-wrapper">
                  <i class="bi bi-box-seam"></i>
                  <input type="number" 
                         [(ngModel)]="variant.stock" 
                         name="stock{{i}}" 
                         class="form-input" 
                         placeholder="0" 
                         required>
                </div>
              </div>
            </div>

            <div class="attributes-grid">
              <div *ngFor="let attr of attributes" class="form-group">
                <ng-container *ngIf="attr.id !== undefined">
                  <label class="form-label">{{ attr.name }}</label>
                  <ng-container [ngSwitch]="attr.dataType">
                    <div class="input-wrapper" *ngSwitchCase="'STRING'">
                    
                      <div class="checkbox-group" *ngIf="attributeOptions[attr.id!]?.length">
  <label *ngFor="let option of attributeOptions[attr.id!]">
    <input
      type="checkbox"
      [value]="option"
      [checked]="variant.attributeValues[attr.id!]?.includes(option)"
      (change)="onCheckboxChange(attr.id!, i, option, $event)"
    />
    <span class="option-text">{{ option }}</span>
    <span class="custom-checkbox"></span>
  </label>
</div>


                      <input *ngIf="!attributeOptions[attr.id!]?.length"
                             type="text"
                             [(ngModel)]="variant.attributeValues[attr.id!]"
                             name="attr_{{attr.id}}_{{i}}"
                             class="form-input"
                             [placeholder]="'Enter ' + attr.name.toLowerCase()" />
                    </div>
                    
                    <div class="input-wrapper" *ngSwitchCase="'NUMBER'">
                    
                      <div class="checkbox-group" *ngIf="attributeOptions[attr.id!]?.length">
                         <label *ngFor="let option of attributeOptions[attr.id!]">
                          <input type="checkbox" 
                                 [value]="option"
                                 [checked]="variant.attributeValues[attr.id!]?.includes(option)"
                                 (change)="onCheckboxChange(attr.id!, i, option, $event)"
                                 name="attr_{{attr.id}}_{{i}}">
                          <span class="option-text">{{ option }}</span>
                          <span class="custom-checkbox"></span>
                        </label>
                      </div>
                       <input *ngIf="!attributeOptions[attr.id!]?.length"
                             type="number"
                                [(ngModel)]="variant.attributeValues[attr.id!]"
                                name="attr_{{attr.id}}_{{i}}"
                                class="form-input"
                                [placeholder]="'Enter ' + attr.name.toLowerCase()" />
                       </div>
                    
                    <div class="switch-wrapper" *ngSwitchCase="'BOOLEAN'">
                      <label class="switch">
                        <input type="checkbox"
                               [(ngModel)]="variant.attributeValues[attr.id!]"
                               name="attr_{{attr.id}}_{{i}}"
                               id="attr_{{attr.id}}_{{i}}">
                        <span class="slider"></span>
                      </label>
                      <span class="switch-label">{{ attr.name }}</span>
                    </div>
                  </ng-container>
                </ng-container>
              </div>
            </div>

            <!-- Variant photo file input -->
            <div class="form-group">
              <label>Variant Photos</label>
              <div class="photo-upload-container">
                <input
                  type="file"
                  (change)="onVariantPhotosSelected($event, i)"
                  accept="image/*"
                  multiple
                  class="form-input"
                />
                <div class="photo-preview-grid" *ngIf="variantPreviews['variant_' + i]?.length">
                  <div class="photo-preview-item" *ngFor="let preview of variantPreviews['variant_' + i]; let photoIndex = index">
                    <img [src]="preview" alt="Variant photo preview">
                    <button type="button" class="remove-photo-btn" (click)="removeVariantPhoto(i, photoIndex)">
                      <i class="bi bi-x-circle"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Submit Section -->
    <div class="submit-section">
      <button type="submit" class="btn-submit" [disabled]="productForm.invalid">
        <i class="bi bi-check-circle-fill"></i>
        Save Product
      </button>
    </div>
  </form>
</div>

<!-- Attribute Options Modal -->
<div class="modal" *ngIf="showOptionsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Manage Attribute Options</h3>
      <button class="close-button" (click)="closeOptionsModal()">
        <i class="bi bi-x"></i>
      </button>
    </div>

    <div class="modal-body">
      <div *ngFor="let attr of attributes" class="attribute-options-section">
        <h4 class="attribute-label">{{ attr.name }}</h4>
        
        <!-- Existing Options -->
        <div class="options-list">
          <div *ngFor="let option of attributeOptions[attr.id!]; let i = index" class="option-item">
            <span>{{ option }}</span>
            <button class="remove-option" (click)="removeOption(attr.id!, i)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>

        <!-- Add New Option -->
        <div class="add-option">
          <input 
            type="text" 
            [(ngModel)]="newOptions[attr.id!]" 
            [placeholder]="'Add new ' + attr.name.toLowerCase() + ' option'"
            (keyup.enter)="addOption(attr.id!)"
            class="form-input"
          />
          <button class="btn-add" (click)="addOption(attr.id!)">
            <i class="bi bi-plus"></i>
            Add
          </button>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-register-options" (click)="saveAttributeOptions()">
        <i class="bi bi-check-circle"></i>
        Save Options
      </button>
    </div>
  </div>
</div>
